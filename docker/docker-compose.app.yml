# qiuqiuwriter 应用部署
# 包含：Backend, Frontend, Admin
# 启动命令：docker compose -f docker-compose.app.yml -p qiuqiuwriter up -d

name: qiuqiuwriter-app

services:
  # ---------- 后端应用 ----------
  backend:
    image: qiuqiuwriter-backend:latest
    container_name: qiuqiuwriter-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../backend:/app
    working_dir: /app
    command: >
      sh -c "uvicorn memos.api.ai_api:app --host 0.0.0.0 --port 8000 --reload"
    # depends_on 移除，因为基础设施在另一个 compose 文件中管理
    # 也可以保留但需要保证网络连通，这里由 external network 保证
    networks:
      - qiuqiuwriter_net

  # ---------- 前端与管理后台（Nginx 托管） ----------
  frontend:
    image: nginx:alpine
    container_name: qiuqiuwriter-frontend
    restart: unless-stopped
    ports:
      - "81:81"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - qiuqiuwriter_net

  admin:
    image: nginx:alpine
    container_name: qiuqiuwriter-admin
    restart: unless-stopped
    ports:
      - "8889:8889"
    volumes:
      - ../admin/dist:/usr/share/nginx/html:ro
      - ./nginx/admin.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - qiuqiuwriter_net

networks:
  qiuqiuwriter_net:
    external: true
    name: qiuqiuwriter_qiuqiuwriter_net
